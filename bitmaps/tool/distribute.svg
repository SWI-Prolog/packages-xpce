  <line x1="21" y1="1" x2="21" y2="23" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
  <line x1="21" y1="1" x2="23" y2="1" stroke="#94a3b8" stroke-width="1"/>
  <line x1="21" y1="11.5" x2="23" y2="11.5" stroke="#94a3b8" stroke-width="1"/>
  <line x1="21" y1="23" x2="23" y2="23" stroke="#94a3b8" stroke-width="1"/>
  <line x1="22" y1="4" x2="22" y2="10" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="1 1"/>
  <line x1="22" y1="13" x2="22" y2="19" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="1 1"/>
