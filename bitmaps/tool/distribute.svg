  <line x1="1" y1="11" x2="23" y2="11" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
  <line x1="1" y1="11" x2="1" y2="13" stroke="#94a3b8" stroke-width="1"/>
  <line x1="12" y1="11" x2="12" y2="13" stroke="#94a3b8" stroke-width="1"/>
  <line x1="23" y1="11" x2="23" y2="13" stroke="#94a3b8" stroke-width="1"/>
  <line x1="5" y1="12" x2="10" y2="12" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="1 1"/>
  <line x1="14" y1="12" x2="19" y2="12" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="1 1"/>
  <!-- vertical col of 3 -->
  <rect x="15" y="1" width="5" height="3" rx="1" fill="#6366f1" opacity="0.6"/>
  <rect x="15" y="10" width="5" height="3" rx="1" fill="#6366f1" opacity="0.6"/>
  <rect x="15" y="19" width="5" height="3" rx="1" fill="#6366f1" opacity="0.6"/>
